name: Type Check

on:
  push:
    branches-ignore:
      - 'develop'
      - 'develop*'

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  type-check:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    strategy:
      fail-fast: true
      matrix:
        command:
          - check:root
          - ws:type-check
          - ws:lint:fix
          - ws:test:browser
          - ws:test:cov
          - codemod:full

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Fetch main
        run: git fetch origin main # To allow check-should-run-type-checks to get the diff from main

      - name: Install pnpm
        uses: pnpm/action-setup@903f9c1a6ebcba6cf41d87230be49611ac97822e # v6.0.3

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: 'package.json'
          registry-url: https://npm.pkg.github.com/
          scope: '@noshiro-pf'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # NOTE: To include this workflow in the branch protection rule status check,
      # skip each step instead of skipping the entire workflow with paths-ignore.
      - name: Check diff
        id: check_diff_type
        run: pnpm exec check-should-run-type-checks

      - name: Exit if no relevant changes
        if: steps.check_diff_type.outputs.should_run != 'true'
        run: exit 0

      - name: Install Playwright Browsers
        if: matrix.command == 'ws:test:browser'
        run: pnpm exec playwright install chromium

      - name: Build all packages
        run: pnpm run ws:build

      - name: Run "${{ matrix.command }}"
        if: matrix.command != 'ws:test:browser'
        run: pnpm run ${{ matrix.command }}

      # Source - https://stackoverflow.com/a/71583518
      - name: Run 'ws:test:browser' with retry
        if: matrix.command == 'ws:test:browser'
        uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60 # v4.0.0
        with:
          timeout_minutes: 10
          max_attempts: 2
          command: pnpm run ${{ matrix.command }}

      - name: Check if there is no file diff
        run: pnpm exec assert-repo-is-clean

      - name: Upload coverage reports to Codecov
        if: matrix.command == 'ws:test:cov'
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
