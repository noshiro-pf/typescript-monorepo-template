name: Type Check

on:
  push:
    branches-ignore:
      - 'develop'
      - 'develop*'
    paths-ignore:
      - '.gitignore'

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  type-check:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    strategy:
      fail-fast: true
      matrix:
        command:
          - check:root
          - ws:type-check
          - ws:lint:fix
          - ws:test:browser
          - ws:test:cov
          - codemod:full

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Fetch main
        run: git fetch origin main

      - name: Install pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version-file: 'package.json'
          registry-url: https://npm.pkg.github.com/
          scope: '@noshiro-pf'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # NOTE: To include this workflow in the branch protection rule status check,
      # skip each steps instead of skipping the entire workflow with paths-ignore.
      - name: Check diff
        id: check_diff_type
        run: pnpm exec check-should-run-type-checks

      - name: Install Playwright Browsers
        if: steps.check_diff_type.outputs.should_run == 'true' && matrix.command == 'ws:test:browser'
        run: pnpm exec playwright install chromium

      - name: Build all packages
        run: pnpm run ws:build

      - name: Run "${{ matrix.command }}"
        if: steps.check_diff_type.outputs.should_run == 'true' && matrix.command != 'ws:test:browser'
        run: pnpm run ${{ matrix.command }}

      # Source - https://stackoverflow.com/a/71583518
      # Posted by VonC, modified by community. See post 'Timeline' for change history
      # Retrieved 2026-02-10, License - CC BY-SA 4.0
      - name: Run 'ws:test:browser' with retry
        if: steps.check_diff_type.outputs.should_run == 'true' && matrix.command == 'ws:test:browser'
        uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60 # v4.0.0
        with:
          timeout_minutes: 10
          max_attempts: 3
          command: pnpm run ${{ matrix.command }}

      - name: Check if there is no file diff
        run: pnpm exec assert-repo-is-clean

      - name: Upload coverage reports to Codecov
        if: steps.check_diff_type.outputs.should_run == 'true' && matrix.command == 'ws:test:cov'
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
